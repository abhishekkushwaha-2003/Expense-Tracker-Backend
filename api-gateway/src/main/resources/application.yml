server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:

        # ✅ Test route
        - id: test-route
          uri: http://httpbin.org
          predicates:
            - Path=/test

        # ✅ Auth Service
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        # ✅ Expense Service
        - id: expense-service
          uri: lb://EXPENSE-SERVICE
          predicates:
            - Path=/expenses/**

        # ✅ Income Service
        - id: income-service
          uri: lb://INCOME-SERVICE
          predicates:
            - Path=/income/**

        # ✅ Category Service
        - id: category-service
          uri: lb://CATEGORY-SERVICE
          predicates:
            - Path=/categories/**

        # ✅ Budget Service
        - id: budget-service
          uri: lb://BUDGET-SERVICE
          predicates:
            - Path=/budgets/**

        # ✅ Analytics Service
        - id: analytics-service
          uri: lb://ANALYTICS-SERVICE
          predicates:
            - Path=/analytics/**

        # ✅ Recurring Service
        - id: recurring-service
          uri: lb://RECURRING-SERVICE
          predicates:
            - Path=/recurring/**

        # ✅ Payment Service
        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/payments/**

        # ✅ Notification Service
        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/notifications/**

        # ✅ Admin Service
        - id: admin-service
          uri: lb://ADMIN-SERVICE
          predicates:
            - Path=/admin/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    hostname: localhost
    prefer-ip-address: true
