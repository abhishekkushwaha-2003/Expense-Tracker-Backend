server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        # ✅ Test route
        - id: test-route
          uri: http://httpbin.org
          predicates:
            - Path=/test

        # ✅ Auth Service
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

        # ✅ Expense Service
        - id: expense-service
          uri: lb://EXPENSE-SERVICE
          predicates:
            - Path=/expenses/**

        # ✅ Income Service
        - id: income-service
          uri: lb://INCOME-SERVICE
          predicates:
            - Path=/income/**

        # ✅ Category Service (NEW)
        - id: category-service
          uri: lb://CATEGORY-SERVICE
          predicates:
            - Path=/categories/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    hostname: localhost
    prefer-ip-address: true