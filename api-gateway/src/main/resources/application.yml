server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        # ✅ Test route (keep it)
        - id: test-route
          uri: http://httpbin.org
          predicates:
            - Path=/test

        # ✅ Auth Service route (NEW)
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka